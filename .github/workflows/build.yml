name: Refresh bundled captdriver source

# Keeps captdriver-valdikss-val.tar.gz (the vendored copy of ValdikSS/captdriver's
# "val" branch that may-in-lbp2900.sh bundles so it doesn't need GitHub access at
# install time) in sync with upstream, and verifies upstream still builds cleanly
# before bundling it -- modeled on the daily-build pattern in brucenguyen1102/zalo-for-linux.

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone latest upstream captdriver (ValdikSS, branch val)
        run: |
          git clone --depth 1 -b val https://github.com/ValdikSS/captdriver.git upstream-captdriver
          echo "UPSTREAM_COMMIT=$(git -C upstream-captdriver rev-parse --short HEAD)" >> "$GITHUB_ENV"

      - name: Check whether the bundle is already up to date
        id: check
        run: |
          rm -rf /tmp/current-bundle
          mkdir -p /tmp/current-bundle
          tar xzf captdriver-valdikss-val.tar.gz -C /tmp/current-bundle --strip-components=1
          rm -rf upstream-captdriver/.git
          if diff -rq /tmp/current-bundle upstream-captdriver >/dev/null 2>&1; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Bundle already matches upstream commit $UPSTREAM_COMMIT, nothing to do."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Upstream has changed (now at $UPSTREAM_COMMIT), will rebuild and re-bundle."
          fi

      - name: Install captdriver build dependencies
        if: steps.check.outputs.changed == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential automake libcups2-dev cups-ppdc

      - name: Verify upstream still builds cleanly
        if: steps.check.outputs.changed == 'true'
        run: |
          cd upstream-captdriver
          export LC_ALL=C LANG=C
          autoreconf -vif
          ./configure
          make

      - name: Repackage the bundle
        if: steps.check.outputs.changed == 'true'
        run: |
          cd upstream-captdriver
          make distclean 2>/dev/null || make clean 2>/dev/null || true
          cd ..
          rm -rf /tmp/captdriver-val
          cp -r upstream-captdriver /tmp/captdriver-val
          tar czf captdriver-valdikss-val.tar.gz -C /tmp captdriver-val

      - name: Commit updated bundle
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add captdriver-valdikss-val.tar.gz
          git commit -m "Auto-refresh bundled captdriver source (upstream ${{ env.UPSTREAM_COMMIT }})"
          git push
